<app-title-bar *ngIf="isElectron" />

<header class="topbar">
  <div class="brand" *ngIf="!isElectron">
    <strong>Snow</strong>
    <span class="project" *ngIf="project() as p">— {{ p.description || p.name }}</span>
  </div>
  <div class="topbar-right" *ngIf="projectSvc.workspace()">
    <div class="researcher">
      <label for="researcher-select">Researcher:</label>
      <select
        id="researcher-select"
        [ngModel]="selectValue()"
        (ngModelChange)="onResearcherChange($event)"
      >
        <option [ngValue]="null">— select —</option>
        <option *ngFor="let r of project()?.researchers" [ngValue]="r.email">{{ r.name }}</option>
      </select>
    </div>
  </div>
</header>

<div class="tab-content">
  <router-outlet />
</div>

<nav class="tab-bar" *ngIf="projectSvc.workspace()">
  <a routerLink="/project" routerLinkActive="active" class="tab-link">
    <app-icon name="settings" class="tab-icon" />
    <span class="tab-label">Project</span>
  </a>
  <a routerLink="/snowballing" routerLinkActive="active" class="tab-link">
    <app-icon name="search" class="tab-icon" />
    <span class="tab-label">Snowballing</span>
  </a>
  <a routerLink="/results" routerLinkActive="active" class="tab-link">
    <app-icon name="bar-chart" class="tab-icon" />
    <span class="tab-label">Results</span>
  </a>
</nav>
